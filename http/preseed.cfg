# http/preseed.cfg
d-i debian-installer/locale string en_US.UTF-8
d-i console-setup/ask_detect boolean false
d-i keyboard-configuration/xkb-keymap select us

d-i netcfg/get_hostname string linuxmint-azure
d-i netcfg/get_domain string localdomain

d-i clock-setup/utc boolean true
d-i time/zone string UTC

# Disk — single partition, no swap (Azure manages swap separately)
d-i partman-auto/disk string /dev/vda
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# User
d-i passwd/user-fullname string packer
d-i passwd/username string packer
d-i passwd/user-password password packer
d-i passwd/user-password-again password packer
d-i user-setup/allow-password-weak boolean true
d-i passwd/auto-login boolean false

# Ubiquity-specific
ubiquity ubiquity/use_nonfree boolean false
ubiquity languagechooser/language-name select English
ubiquity countrychooser/shortlist select US
ubiquity localechooser/supported-locales multiselect en_US.UTF-8

# Post-install: install SSH so Packer can connect
ubiquity ubiquity/success_command string \
  in-target apt-get install -y openssh-server; \
  in-target systemctl enable ssh